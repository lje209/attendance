<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>출퇴근 시스템</title>
</head>
<body>

<h2>출퇴근 체크</h2>

<input type="text" id="empId" placeholder="직원번호 입력">

<button onclick="checkIn()">출근</button>
<button onclick="checkOut()">퇴근</button>

<p id="status"></p>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// 👉 여기에 아까 복사한 Firebase config 붙여넣기
const firebaseConfig = {
  apiKey: "AIzaSyAiDkKjFQQmt_B6OMfwNK4DAMZr8DHubNo",
  authDomain: "attendance-management-sy-754bb.firebaseapp.com",
  projectId: "attendance-management-sy-754bb",
  storageBucket: "attendance-management-sy-754bb.firebasestorage.app",
  messagingSenderId: "805724918403",
  appId: "1:805724918403:web:3a69d6b3142531666041b6",
  measurementId: "G-6DN66NK0TT"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 매장 위치 (예: 이마트 춘천점 → 수정 가능)
const centerLat = 37.871597;
const centerLng = 127.746896;
const radius = 50; // 50m

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function checkQR() {
  const params = new URLSearchParams(window.location.search);
  const qr = params.get("qr");

  if (qr !== "ok") {
    alert("QR코드를 통해 접속하세요");
    return false;
  }

  return true;
}
  
function save(type, lat, lng) {
const name = document.getElementById("empId").value.trim();

if (!name) {
  alert("직원번호 입력하세요");
  return;
}

  const today = new Date().toISOString().split('T')[0];

  db.collection("attendance")
    .where("name", "==", name)
    .get()
    .then((querySnapshot) => {

      let count = 0;

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const date = data.time.toDate().toISOString().split('T')[0];

        if (date === today) count++;
      });

      if (count >= 2) {
        alert("오늘은 이미 출퇴근 완료");
        return;
      }

      db.collection("attendance").add({
        name: name,
        type: type,
        lat: lat,
        lng: lng,
        time: new Date()
      });

      document.getElementById("status").innerText = type + " 완료";
    });
}
  
function check(type) {
  if (!checkQR()) return;
  navigator.geolocation.getCurrentPosition(function(pos) {


    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const distance = getDistance(lat, lng, centerLat, centerLng);

    if (distance > radius) {
      alert("매장 근처에서만 가능합니다");
      return;
    }

    save(type, lat, lng);

  }, function() {
    alert("위치 권한 허용 필요");
  });
}

function checkIn() {
  check("출근");
}

function checkOut() {
  check("퇴근");
}
</script>

</body>
</html>
