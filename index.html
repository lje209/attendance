<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>출퇴근 시스템</title>
</head>
<body>

<h2>출퇴근 체크</h2>

<input type="text" id="name" placeholder="이름 입력"><br><br>

<button onclick="checkIn()">출근</button>
<button onclick="checkOut()">퇴근</button>

<p id="status"></p>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
// 👉 여기에 아까 복사한 Firebase config 붙여넣기
const firebaseConfig = {
  apiKey: "여기",
  authDomain: "여기",
  projectId: "여기",
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 매장 위치 (예: 이마트 춘천점 → 수정 가능)
const centerLat = 37.8813;
const centerLng = 127.7270;
const radius = 100; // 100m

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function save(type, lat, lng) {
  const name = document.getElementById("name").value;

  db.collection("attendance").add({
    name: name,
    type: type,
    lat: lat,
    lng: lng,
    time: new Date()
  });

  document.getElementById("status").innerText = type + " 완료";
}

function check(type) {
  navigator.geolocation.getCurrentPosition(function(pos) {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const distance = getDistance(lat, lng, centerLat, centerLng);

    if (distance > radius) {
      alert("매장 근처에서만 가능합니다");
      return;
    }

    save(type, lat, lng);

  }, function() {
    alert("위치 권한 허용 필요");
  });
}

function checkIn() {
  check("출근");
}

function checkOut() {
  check("퇴근");
}
</script>

</body>
</html>
