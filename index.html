<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>안테나숍 출퇴근 시스템</title>
  <style>
    /* 화면 전체 스타일 */
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f7f6;
    }
    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    h2 { color: #333; margin-bottom: 30px; }
    
    /* 입력창 크게 */
    input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: 2px solid #ddd;
      border-radius: 10px;
      box-sizing: border-box;
      margin-bottom: 20px;
      text-align: center;
    }
    
    /* 버튼 크게 */
    button {
      width: 100%;
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 15px;
    }
    .btn-in { background-color: #2ecc71; }
    .btn-out { background-color: #e74c3c; }
    
    #status {
      margin-top: 20px;
      font-weight: bold;
      color: #555;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>강원 6차산업 안테나숍<br>출퇴근 체크</h2>

  <input type="text" id="empName" placeholder="성함을 입력하세요">

  <button class="btn-in" onclick="checkIn()">출근하기</button>
  <button class="btn-out" onclick="checkOut()">퇴근하기</button>

  <p id="status">대기 중...</p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAiDkKjFQQmt_B6OMfwNK4DAMZr8DHubNo",
  authDomain: "attendance-management-sy-754bb.firebaseapp.com",
  projectId: "attendance-management-sy-754bb",
  storageBucket: "attendance-management-sy-754bb.firebasestorage.app",
  messagingSenderId: "805724918403",
  appId: "1:805724918403:web:3a69d6b3142531666041b6",
  measurementId: "G-6DN66NK0TT"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 이마트 춘천점 위치
const centerLat = 37.871597;
const centerLng = 127.746896;
const radius = 100; // 위치 오차 고려하여 100m로 상향

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function checkQR() {
  const params = new URLSearchParams(window.location.search);
  const qr = params.get("qr");
  if (qr !== "ok") {
    alert("올바른 QR코드를 통해 접속하세요.");
    return false;
  }
  return true;
}
  
function save(type, lat, lng) {
  const name = document.getElementById("empName").value.trim(); // ID empName으로 변경

  if (!name) {
    alert("성함을 입력해주세요.");
    return;
  }

  const today = new Date().toLocaleDateString('ko-KR');

  db.collection("attendance")
    .where("name", "==", name)
    .get()
    .then((querySnapshot) => {
      let count = 0;
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const docDate = data.time.toDate().toLocaleDateString('ko-KR');
        if (docDate === today && data.type === type) count++;
      });

      if (count > 0) {
        alert("이미 오늘 " + type + " 처리가 되었습니다.");
        return;
      }

      db.collection("attendance").add({
        name: name,
        type: type,
        lat: lat,
        lng: lng,
        time: firebase.firestore.FieldValue.serverTimestamp() // 서버 시간 사용
      }).then(() => {
        document.getElementById("status").innerText = name + "님 " + type + " 완료 (" + new Date().toLocaleTimeString() + ")";
        alert(name + "님 " + type + " 처리가 완료되었습니다.");
      });
    });
}
  
function check(type) {
  if (!checkQR()) return;
  
  document.getElementById("status").innerText = "위치 확인 중...";
  
  navigator.geolocation.getCurrentPosition(function(pos) {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const distance = getDistance(lat, lng, centerLat, centerLng);

    if (distance > radius) {
      alert("매장 근처가 아닙니다. (현재 거리: " + Math.round(distance) + "m)");
      document.getElementById("status").innerText = "거리 제한으로 실패";
      return;
    }

    save(type, lat, lng);
  }, function(err) {
    alert("위치 권한을 허용해야 출퇴근이 가능합니다.");
    document.getElementById("status").innerText = "위치 권한 오류";
  }, { enableHighAccuracy: true });
}

function checkIn() { check("출근"); }
function checkOut() { check("퇴근"); }
</script>

</body>
</html>
